<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover"><title>Japa Pro</title><link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet"><style>*{margin:0;padding:0;box-sizing:border-box}body{background:linear-gradient(145deg,#1a0f0a 0%,#2d1a10 100%);font-family:'Inter',sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh;color:#f5efe6;user-select:none;padding:16px;overflow:hidden}.container{text-align:center;padding:24px;max-width:420px;width:100%;background:rgba(255,255,255,0.04);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-radius:48px;border:1px solid rgba(255,255,255,0.08);box-shadow:0 30px 60px rgba(0,0,0,0.6)}.glow{position:fixed;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle at 50% 50%,rgba(184,134,11,0.08),transparent 70%);pointer-events:none;z-index:-1;animation:glowPulse 8s ease-in-out infinite}@keyframes glowPulse{0%,100%{opacity:0.5}50%{opacity:1}}h1{font-family:'Playfair Display',serif;font-size:32px;color:#d4af37;letter-spacing:2px;text-shadow:0 0 40px rgba(212,175,55,0.15)}.sub{font-size:14px;color:rgba(255,255,255,0.5);margin-bottom:24px;letter-spacing:3px;font-weight:600}.mala{width:220px;height:220px;margin:0 auto 20px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#d4a373,#8b5a2b);box-shadow:0 0 60px rgba(212,175,55,0.2),0 20px 40px rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;font-size:80px;font-weight:bold;color:#f5efe6;cursor:pointer;transition:transform 0.15s cubic-bezier(0.34,1.56,0.64,1),box-shadow 0.3s;position:relative;overflow:hidden}.mala::before{content:'';position:absolute;inset:0;border-radius:50%;background:radial-gradient(circle at 30% 20%,rgba(255,255,255,0.15),transparent 60%);pointer-events:none}.mala:active{transform:scale(0.92)}.mala .inner-ring{position:absolute;width:85%;height:85%;border-radius:50%;border:2px solid rgba(255,255,255,0.08);pointer-events:none}.count-label{font-size:14px;color:rgba(255,255,255,0.4);letter-spacing:2px;text-transform:uppercase;font-weight:600;margin-bottom:4px}.controls{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:16px}button{padding:12px 20px;border:none;border-radius:40px;font-size:14px;font-weight:600;font-family:'Inter',sans-serif;background:rgba(255,255,255,0.06);color:white;cursor:pointer;transition:all 0.2s;backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.06)}button:active{transform:scale(0.95)}button.primary{background:linear-gradient(135deg,#d4af37,#b8860b);color:#1a0f0a;border:none;box-shadow:0 4px 20px rgba(212,175,55,0.25)}button.primary:active{box-shadow:0 2px 10px rgba(212,175,55,0.15)}button.secondary{background:rgba(255,255,255,0.04)}button.secondary:active{background:rgba(255,255,255,0.08)}.goal-section{display:flex;align-items:center;justify-content:center;gap:12px;margin-top:18px;padding:12px 16px;background:rgba(255,255,255,0.03);border-radius:30px;border:1px solid rgba(255,255,255,0.04)}.goal-section label{font-size:13px;color:rgba(255,255,255,0.5);font-weight:600}.goal-section input{width:60px;padding:6px 8px;border-radius:20px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.04);color:white;text-align:center;font-family:'Inter',sans-serif;font-weight:600;font-size:14px;outline:none}.goal-section input:focus{border-color:#d4af37}.goal-status{width:12px;height:12px;border-radius:50%;display:inline-block;transition:all 0.3s}.complete{margin-top:16px;font-size:22px;color:#d4af37;font-weight:bold;opacity:0;transition:opacity 0.6s;font-family:'Playfair Display',serif}.complete.show{opacity:1}.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:20px;padding:16px;background:rgba(255,255,255,0.02);border-radius:24px;border:1px solid rgba(255,255,255,0.04)}.stat-item{text-align:center}.stat-value{font-size:20px;font-weight:700;color:white}.stat-label{font-size:11px;color:rgba(255,255,255,0.35);text-transform:uppercase;letter-spacing:1px;margin-top:2px}.progress-bar{width:100%;height:4px;background:rgba(255,255,255,0.06);border-radius:4px;margin-top:12px;overflow:hidden}.progress-fill{height:100%;background:linear-gradient(90deg,#d4af37,#b8860b);border-radius:4px;transition:width 0.5s ease;width:0%}.timer-text{font-size:13px;color:rgba(255,255,255,0.3);font-weight:600;letter-spacing:1px;margin-top:4px}.confetti-container{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:999;overflow:hidden}.confetti{position:absolute;width:8px;height:8px;border-radius:2px;animation:fall linear forwards}@keyframes fall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}</style></head><body><div class="glow"></div><div class="confetti-container" id="confetti"></div><div class="container"><h1>🕉️ Japa Pro</h1><div class="sub">108 • Hare Krishna</div><div class="mala" id="c"><div class="inner-ring"></div>108</div><div class="count-label">Chants remaining</div><div class="controls"><button class="primary" id="t">🪵 Tap Bead</button><button class="secondary" id="r">⟳ Reset</button><button class="secondary" id="s">🔊 Sound</button><button class="secondary" id="sh">📤 Share</button></div><div class="goal-section"><label>🎯 Goal</label><input type="number" id="goal" value="108" min="1" max="1000"><span class="goal-status" id="goalStatus"></span></div><div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div><div class="complete" id="msg">🙏 Complete! Hare Krishna! 🎉</div><div class="timer-text">⏱️ <span id="tm">0s</span></div><div class="stats-grid"><div class="stat-item"><div class="stat-value" id="td">0</div><div class="stat-label">Today's Chants</div></div><div class="stat-item"><div class="stat-value" id="rd">0</div><div class="stat-label">Rounds</div></div><div class="stat-item"><div class="stat-value" id="streak">0</div><div class="stat-label">🔥 Streak</div></div><div class="stat-item"><div class="stat-value" id="best">0</div><div class="stat-label">🏆 Best</div></div></div></div><script>let c=108,t=0,r=0,s=1,st=null,e=0,goal=108,streak=0,best=0;const $=id=>document.getElementById(id),D=$('c'),T=$('td'),R=$('rd'),M=$('msg'),TM=$('tm'),G=$('goal'),GS=$('goalStatus'),PF=$('progressFill'),ST=$('streak'),BT=$('best');function u(){D.textContent=c;T.textContent=t;R.textContent=r;M.className=c?'complete':'complete show';$('s').textContent=s?'🔊 On':'🔇 Off';GS.style.background=t>=goal?'#4ade80':'#ff6b6b';PF.style.width=Math.min(100,(t/goal)*100)+'%';ST.textContent=streak;BT.textContent=best;localStorage.setItem('j',JSON.stringify({c,t,r,s,e,goal,streak,best,d:new Date().toDateString()}))}function p(){if(c>0){c--;t++;if(t===1&&!st){st=Date.now();setInterval(()=>{e=Math.floor((Date.now()-st)/1000);TM.textContent=e+'s'},1000)}if(c===0){r++;fireConfetti()}u()}}function fireConfetti(){const container=$('confetti');const colors=['#d4af37','#b8860b','#ff6b6b','#4ecdc4','#ffe66d','#ff9ff3'];for(let i=0;i<80;i++){const el=document.createElement('div');el.className='confetti';el.style.left=Math.random()*100+'%';el.style.background=colors[Math.floor(Math.random()*colors.length)];el.style.width=Math.random()*6+4+'px';el.style.height=Math.random()*6+4+'px';el.style.animationDuration=Math.random()*2+2+'s';el.style.animationDelay=Math.random()*1+'s';container.appendChild(el);setTimeout(()=>el.remove(),4000)}}$('t').onclick=p;D.onclick=p;$('r').onclick=()=>{c=108;u()};$('s').onclick=()=>{s=!s;u()};$('sh').onclick=()=>{const x=`🕉️ Japa Pro\n${r} rounds (${t} chants) today!\nGoal: ${t>=goal?'✅':'⏳'} ${t}/${goal}\n🔥 ${streak}-day streak\n🏆 Best: ${best} chants\n\nHare Krishna! 🙏`;navigator.share?navigator.share({title:'Japa Pro',text:x}):navigator.clipboard.writeText(x).then(()=>alert('Copied!'))};G.onchange=()=>{goal=parseInt(G.value)||108;u()};const L=localStorage.getItem('j');if(L){const d=JSON.parse(L);const today=new Date().toDateString();if(d.d===today){c=d.c;t=d.t;r=d.r;s=d.s;e=d.e;goal=d.goal||108;streak=d.streak||0;best=d.best||0;if(e>0){st=Date.now()-e*1000;setInterval(()=>{e=Math.floor((Date.now()-st)/1000);TM.textContent=e+'s'},1000)}}else{if(d.d){const yesterday=new Date();yesterday.setDate(yesterday.getDate()-1);if(d.d===yesterday.toDateString()&&d.t>=d.goal)streak++;else streak=0}if(d.t>best)best=d.t;c=108;t=0}u()}setInterval(()=>{const d=JSON.parse(localStorage.getItem('j'));if(d){const today=new Date().toDateString();if(d.d!==today){if(d.t>best)best=d.t;if(d.t>=d.goal)streak++;else streak=0;c=108;t=0;u()}}},60000);</script></body></html>
