<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Japa Pro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background: #0f0b0a;
            background-image: radial-gradient(circle at 15% 25%, #2a1b16 0%, #0f0b0a 70%);
            min-height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', sans-serif;
            padding: 16px;
            color: #f5efe6;
            overflow: hidden;
            position: relative;
        }

        /* Ambient Glow */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.3;
            pointer-events: none;
            z-index: 0;
        }
        .orb-1 { width: 300px; height: 300px; background: #b8860b; top: -80px; right: -100px; animation: floatOrb 12s infinite alternate ease-in-out; }
        .orb-2 { width: 200px; height: 200px; background: #8b5a2b; bottom: -60px; left: -80px; animation: floatOrb 15s infinite alternate-reverse ease-in-out; }
        @keyframes floatOrb {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(30px, 40px) scale(1.2); }
        }

        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 32px 20px;
            max-width: 420px;
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 48px;
            border: 1px solid rgba(255, 215, 0, 0.08);
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
        }

        /* Header */
        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            font-weight: 700;
            color: #d4af37;
            letter-spacing: 1px;
            margin-bottom: 2px;
            text-shadow: 0 0 30px rgba(212, 175, 55, 0.15);
        }
        .sub {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.3);
            letter-spacing: 4px;
            text-transform: uppercase;
            font-weight: 600;
            margin-bottom: 28px;
        }

        /* The Bead */
        .mala-wrapper {
            position: relative;
            width: 240px;
            height: 240px;
            margin: 0 auto 16px;
        }
        .mala {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 25%, #e8c89e, #8b5a2b 80%, #5a3820);
            box-shadow: 
                inset 0 -20px 40px rgba(0,0,0,0.6),
                0 0 50px rgba(212, 175, 55, 0.15),
                0 20px 40px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            cursor: pointer;
            transition: transform 0.15s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.3s;
        }
        .mala:active { transform: scale(0.94); }
        .mala::after {
            content: '';
            position: absolute;
            inset: 6px;
            border-radius: 50%;
            border: 2px solid rgba(212, 175, 55, 0.25);
            pointer-events: none;
        }
        .mala-number {
            font-family: 'Playfair Display', serif;
            font-size: 80px;
            font-weight: 700;
            color: #f5efe6;
            text-shadow: 0 4px 20px rgba(0,0,0,0.5);
            transition: color 0.3s;
            z-index: 2;
        }

        .label { font-size: 13px; color: rgba(255,255,255,0.4); letter-spacing: 1px; font-weight: 600; margin-bottom: 16px; }

        /* Buttons */
        .controls { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-bottom: 20px; }
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.2s;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        button:active { transform: scale(0.95); }
        .btn-primary {
            background: linear-gradient(135deg, #d4af37, #b8860b);
            color: #1a0f0a;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.2);
            flex: 1;
        }
        .btn-secondary {
            background: rgba(255, 255, 255, 0.06);
            color: #f5efe6;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        /* Goal Section */
        .goal-wrap {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: rgba(255,255,255,0.03);
            border-radius: 30px;
            padding: 8px 16px;
            margin-bottom: 14px;
            border: 1px solid rgba(255,255,255,0.04);
        }
        .goal-wrap label { font-size: 12px; color: rgba(255,255,255,0.5); font-weight: 600; }
        .goal-wrap input {
            width: 48px; padding: 4px 6px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.08);
            background: rgba(255,255,255,0.04); color: white; text-align: center; font-weight: 700; font-size: 14px; outline: none;
        }
        .goal-wrap input:focus { border-color: #d4af37; }
        .goal-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; transition: 0.3s; }

        /* Progress */
        .progress-bar { width: 100%; height: 4px; background: rgba(255,255,255,0.06); border-radius: 4px; overflow: hidden; margin-bottom: 8px; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #d4af37, #b8860b); border-radius: 4px; width: 0%; transition: width 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); }

        /* Stats Grid */
        .stats-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 14px; padding: 14px;
            background: rgba(255,255,255,0.02); border-radius: 24px; border: 1px solid rgba(255,255,255,0.04);
        }
        .stat-item { text-align: center; }
        .stat-val { font-size: 22px; font-weight: 700; color: #fff; line-height: 1.2; }
        .stat-lab { font-size: 10px; color: rgba(255,255,255,0.35); text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }

        /* Timer & Complete */
        .timer { font-size: 13px; color: rgba(255,255,255,0.3); font-weight: 600; margin-top: 4px; letter-spacing: 1px; }
        .complete {
            font-family: 'Playfair Display', serif;
            font-size: 20px; color: #d4af37; font-weight: 700; opacity: 0; transition: opacity 0.5s; margin-top: 8px; text-shadow: 0 0 20px rgba(212,175,55,0.2);
        }
        .complete.show { opacity: 1; }

        /* Confetti */
        .confetti-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 999; overflow: hidden; }
        .confetti { position: absolute; width: 8px; height: 8px; border-radius: 2px; animation: fall linear forwards; }
        @keyframes fall {
            0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }

        /* Fade-in animation */
        .container { animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <!-- Ambient Orbs -->
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <!-- Confetti -->
    <div class="confetti-container" id="confetti"></div>

    <!-- Main App -->
    <div class="container">
        <h1>🕉️ Japa Pro</h1>
        <div class="sub">Hare Krishna • 108</div>

        <div class="mala-wrapper">
            <div class="mala" id="c">
                <span class="mala-number" id="displayNum">108</span>
            </div>
        </div>
        <div class="label">Chants remaining</div>

        <div class="controls">
            <button class="btn-primary" id="t">🪵 Tap Bead</button>
            <button class="btn-secondary" id="r">⟳ Reset</button>
            <button class="btn-secondary" id="s">🔊</button>
            <button class="btn-secondary" id="sh">📤</button>
        </div>

        <div class="goal-wrap">
            <label>🎯 Goal</label>
            <input type="number" id="goal" value="108" min="1" max="1000">
            <span class="goal-dot" id="goalStatus"></span>
        </div>

        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>

        <div class="complete" id="msg">🙏 Complete! Hare Krishna! 🎉</div>
        <div class="timer">⏱️ <span id="tm">0s</span></div>

        <div class="stats-grid">
            <div class="stat-item"><div class="stat-val" id="td">0</div><div class="stat-lab">Today</div></div>
            <div class="stat-item"><div class="stat-val" id="rd">0</div><div class="stat-lab">Rounds</div></div>
            <div class="stat-item"><div class="stat-val" id="streak">0</div><div class="stat-lab">🔥 Streak</div></div>
            <div class="stat-item"><div class="stat-val" id="best">0</div><div class="stat-lab">🏆 Best</div></div>
        </div>
    </div>

    <script>
        let c=108,t=0,r=0,s=1,st=null,e=0,goal=108,streak=0,best=0;
        const $=id=>document.getElementById(id);
        const D=$('displayNum'), T=$('td'), R=$('rd'), M=$('msg'), TM=$('tm'), G=$('goal'), GS=$('goalStatus'), PF=$('progressFill'), ST=$('streak'), BT=$('best'), MALA=$('c');

        function u(){
            D.textContent=c; T.textContent=t; R.textContent=r;
            M.className = c?'complete':'complete show';
            $('s').textContent = s?'🔊':'🔇';
            GS.style.background = t>=goal?'#4ade80':'#ff4757';
            PF.style.width = Math.min(100, (t/goal)*100)+'%';
            ST.textContent=streak; BT.textContent=best;
            localStorage.setItem('j', JSON.stringify({c,t,r,s,e,goal,streak,best,d:new Date().toDateString()}));
        }

        function p(){
            if(c>0){
                c--; t++;
                if(t===1 && !st){ st=Date.now(); setInterval(()=>{ e=Math.floor((Date.now()-st)/1000); TM.textContent=e+'s'; },1000); }
                if(c===0){ r++; fireConfetti(); }
                if(navigator.vibrate) navigator.vibrate(10);
                u();
            }
        }

        function fireConfetti(){
            const container=$('confetti');
            const colors=['#d4af37','#b8860b','#ff6b6b','#4ecdc4','#ffe66d','#ff9ff3'];
            for(let i=0;i<80;i++){
                const el=document.createElement('div'); el.className='confetti';
                el.style.left=Math.random()*100+'%';
                el.style.background=colors[Math.floor(Math.random()*colors.length)];
                el.style.width=Math.random()*6+4+'px'; el.style.height=Math.random()*6+4+'px';
                el.style.animationDuration=Math.random()*2+2+'s';
                el.style.animationDelay=Math.random()*1+'s';
                container.appendChild(el);
                setTimeout(()=>el.remove(),4000);
            }
        }

        MALA.onclick=p; $('t').onclick=p;
        $('r').onclick=()=>{ c=108; u(); };
        $('s').onclick=()=>{ s=!s; u(); };
        $('sh').onclick=()=>{
            const x=`🕉️ Japa Pro\n${r} rounds (${t} chants) today!\nGoal: ${t>=goal?'✅':'⏳'} ${t}/${goal}\n🔥 ${streak}-day streak\n🏆 Best: ${best} chants\n\nHare Krishna! 🙏`;
            navigator.share? navigator.share({title:'Japa Pro',text:x}) : navigator.clipboard.writeText(x).then(()=>alert('Copied!'));
        };
        G.onchange=()=>{ goal=parseInt(G.value)||108; u(); };

        const L=localStorage.getItem('j');
        if(L){
            const d=JSON.parse(L), today=new Date().toDateString();
            if(d.d===today){ c=d.c; t=d.t; r=d.r; s=d.s; e=d.e; goal=d.goal||108; streak=d.streak||0; best=d.best||0; if(e>0){ st=Date.now()-e*1000; setInterval(()=>{ e=Math.floor((Date.now()-st)/1000); TM.textContent=e+'s'; },1000); } }
            else { if(d.d){ let y=new Date(); y.setDate(y.getDate()-1); if(d.d===y.toDateString() && d.t>=d.goal) streak++; else streak=0; } if(d.t>best) best=d.t; c=108; t=0; } u();
        }

        setInterval(()=>{
            const d=JSON.parse(localStorage.getItem('j'));
            if(d){ const today=new Date().toDateString(); if(d.d!==today){ if(d.t>best) best=d.t; if(d.t>=d.goal) streak++; else streak=0; c=108; t=0; u(); } }
        }, 60000);
    </script>
</body>
</html>
